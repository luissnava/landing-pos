<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Cuadro acortado: 512x400 -->
  <rect width="512" height="400" rx="80" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="388" rx="76" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.4"/>

  <!-- TENEDOR: posicionado a la izquierda, centrado verticalmente -->
  <g transform="translate(60, 145)" fill="#ffffff" opacity="0.92">
    <path d="M3,0 C2,0 1,1 1,2 L1,32 C1,34 2,35 3,35 C4,35 5,34 5,32 L5,2 C5,1 4,0 3,0 Z"/>
    <path d="M11,0 C10,0 9,1 9,2 L9,36 C9,38 10,39 11,39 C12,39 13,38 13,36 L13,2 C13,1 12,0 11,0 Z"/>
    <path d="M19,0 C18,0 17,1 17,2 L17,32 C17,34 18,35 19,35 C20,35 21,34 21,32 L21,2 C21,1 20,0 19,0 Z"/>
    <path d="M1,32 C1,44 3,46 5,47 L5,52 L7,52 L7,47 C9,47 11,46 11,46 C11,46 13,47 15,47 L15,52 L17,52 L17,47 C19,46 21,44 21,32 L19,32 C19,42 18,43 17,44 L5,44 C4,43 3,42 3,32 Z"/>
    <path d="M7,52 L7,108 C7,110 9,111 11,111 C13,111 15,110 15,108 L15,52 Z"/>
    <ellipse cx="11" cy="108" rx="4" ry="3"/>
  </g>

  <!-- CUCHILLO: posicionado a la derecha, centrado verticalmente -->
  <g transform="translate(427, 145)" fill="#ffffff" opacity="0.92">
    <path d="M6,0 L6,58 C6,62 8,64 10,65 L10,0 Z"/>
    <rect x="4" y="65" width="16" height="6" rx="2"/>
    <path d="M5,71 L5,108 C5,110 7,111 12,111 C17,111 19,110 19,108 L19,71 Z"/>
    <circle cx="12" cy="80" r="2.5" fill="rgba(0,0,0,0.15)" opacity="0.5"/>
    <circle cx="12" cy="93" r="2.5" fill="rgba(0,0,0,0.15)" opacity="0.5"/>
    <circle cx="12" cy="106" r="2" fill="rgba(0,0,0,0.15)" opacity="0.5"/>
  </g>

  <!-- MC centrado en el cuadro acortado -->
  <text x="256" y="210"
        font-family="Georgia, serif"
        font-size="148"
        font-weight="700"
        fill="#ffffff"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="-4">MC</text>

  <!-- Separador -->
  <rect x="156" y="293" width="200" height="3" rx="2" fill="#ffffff" opacity="0.5"/>

  <!-- POS -->
  <text x="256" y="345"
        font-family="Georgia, serif"
        font-size="42"
        font-weight="400"
        fill="#ffffff"
        text-anchor="middle"
        opacity="0.7"
        letter-spacing="12">POS</text>
</svg>
